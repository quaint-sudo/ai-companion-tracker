name: Manual data update

on:
  workflow_dispatch:
  # Scheduled updates are disabled for this version.
  # To enable weekly updates, uncomment:
  schedule:
    - cron: '0 12 * * MON'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run pipeline
        run: python scripts/run_pipeline.py
      
      - name: Commit updated data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/reddit_weekly.json
          if ! git diff --cached --quiet; then
            git commit -m "Manual data update: $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No changes to commit."
          fi
