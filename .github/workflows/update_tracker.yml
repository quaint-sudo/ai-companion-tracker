name: Auto-update Indicator Tracker

on:
  schedule:
    - cron: '0 0 * * 1' # Runs at 00:00 UTC every Monday
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Tracker Pipeline
        run: python scripts/run_pipeline.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/data/ data/processed/
          git commit -m "Auto-update indicator data [skip ci]" || echo "No changes to commit"
          git push
