name: Weekly Data Update

on:
  schedule:
    - cron: '0 6 * * 1'    # Every Monday at 06:00 UTC
  workflow_dispatch:         # Manual trigger button in GitHub UI

permissions:
  contents: write            # Needed to push CSV updates back to repo

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run App Store ingestion
        run: python -m ingestion.appstore_rss

      - name: Run Trustpilot ingestion
        run: python -m ingestion.trustpilot

      - name: Run Reddit ingestion (public JSON, no API key)
        run: python -m ingestion.reddit_api

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: weekly data update $(date -u +%Y-W%V)"
          git push
